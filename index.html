<!DOCTYPE html>
<html lang="en" style="background:#ffffff">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tomorrow Telecom — Delivery Calendar</title>
<style>
  html { background: #ffffff; }
  :root {
    --bg: #f4f6f9;
    --surface: #ffffff;
    --surface2: #f0f2f5;
    --border: #e0e4ea;
    --text: #111827;
    --text-dim: #6b7280;
    --delivered-bg: #dcfce7;
    --out-bg: #fff7ed;
    --way-bg: #eff6ff;
    --pending-bg: #f3f4f6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f4f6f9; color: #111827; font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; min-height: 100vh; }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex; align-items: center; gap: 16px;
    position: sticky; top: 0; z-index: 200;
  }
  header h1 { font-size: 17px; font-weight: 700; }
  #headerDate { font-size: 12px; color: var(--text-dim); margin-left: auto; }

  /* ── Filter bar ── */
  .filter-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 24px;
    display: flex; align-items: center; gap: 12px;
    position: sticky; top: 49px; z-index: 190;
    flex-wrap: wrap;
  }
  .filter-label { font-size: 12px; color: var(--text-dim); font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; white-space: nowrap; }

  /* Custom multi-select dropdown */
  .dropdown-wrap { position: relative; }
  .dropdown-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 6px 12px;
    font-size: 13px;
    cursor: pointer;
    display: flex; align-items: center; gap: 8px;
    min-width: 180px;
    user-select: none;
  }
  .dropdown-btn:hover { border-color: #5c6bc0; }
  .dropdown-btn .arrow { margin-left: auto; font-size: 10px; transition: transform 0.15s; }
  .dropdown-btn.open .arrow { transform: rotate(180deg); }
  .dropdown-menu {
    display: none;
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    background: #ffffff;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px;
    min-width: 200px;
    z-index: 300;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }
  .dropdown-menu.open { display: block; }
  .dropdown-item {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    transition: background 0.1s;
  }
  .dropdown-item:hover { background: var(--surface2); }
  .dropdown-item input[type=checkbox] { accent-color: #5c6bc0; width: 15px; height: 15px; cursor: pointer; }
  .name-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .dropdown-divider { border: none; border-top: 1px solid var(--border); margin: 6px 0; }
  .dropdown-action { font-size: 11px; color: var(--text-dim); text-align: center; padding: 4px; cursor: pointer; }
  .dropdown-action:hover { color: var(--text); }

  /* Status filter pills */
  .status-pills { display: flex; gap: 6px; flex-wrap: wrap; }
  .pill {
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid transparent;
    opacity: 0.5;
    transition: opacity 0.15s, border-color 0.15s;
    user-select: none;
  }
  .pill.active { opacity: 1; }
  .pill-all  { background: #f0f2f5; color: #111827; border-color: #d1d5db; }
  .pill-out  { background: #fff7ed; color: #9a3412; border-color: #fdba74; }
  .pill-way  { background: #eff6ff; color: #1e40af; border-color: #93c5fd; }
  .pill-done { background: #dcfce7; color: #166534; border-color: #86efac; }
  .pill-pend { background: #f3f4f6; color: #374151; border-color: #d1d5db; }

  /* ── Stats ── */
  .container { padding: 20px 24px; max-width: 1100px; margin: 0 auto; }
  .stats-row { display: flex; gap: 10px; margin-bottom: 24px; flex-wrap: wrap; }
  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 18px;
    flex: 1; min-width: 130px;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.1s;
  }
  .stat:hover { border-color: #aaa; transform: translateY(-1px); }
  .stat.active-stat { background: #111827; border-color: #111827; }
  .stat.active-stat .stat-value { color: #ffffff !important; }
  .stat.active-stat .stat-label { color: #d1d5db; }
  .stat-value { font-size: 26px; font-weight: 700; line-height: 1; }
  .stat-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.7px; margin-top: 4px; }

  /* ── Day sections ── */
  .day-section { margin-bottom: 16px; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
  .day-header {
    display: flex; align-items: center; gap: 10px;
    padding: 13px 16px;
    background: var(--surface);
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
  }
  .day-header:hover { background: var(--surface2); }
  .day-toggle { font-size: 13px; color: var(--text-dim); transition: transform 0.2s; flex-shrink: 0; }
  .day-section.collapsed .day-toggle { transform: rotate(-90deg); }
  .day-header h2 { font-size: 15px; font-weight: 600; }
  .day-count { font-size: 12px; color: var(--text-dim); background: var(--surface2); padding: 2px 8px; border-radius: 20px; white-space: nowrap; }
  .day-status-badge {
    font-size: 11px; padding: 3px 10px; border-radius: 20px;
    font-weight: 600; letter-spacing: 0.4px; text-transform: uppercase;
    margin-left: auto; white-space: nowrap;
  }
  .badge-delivered { background: #dcfce7; color: #166534; border: 1px solid #86efac; }
  .badge-out       { background: #fff7ed; color: #9a3412; border: 1px solid #fdba74; }
  .badge-way       { background: #eff6ff; color: #1e40af; border: 1px solid #93c5fd; }
  .badge-pending   { background: #f3f4f6; color: #374151; border: 1px solid #d1d5db; }

  .day-body { padding: 12px; background: var(--bg); }
  .day-section.collapsed .day-body { display: none; }

  /* ── Order cards ── */
  .orders-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 10px; }
  .order-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 15px;
    border-left: 4px solid;
    transition: transform 0.1s;
  }
  .order-card:hover { transform: translateY(-1px); }
  .order-card.hidden { display: none; }
  .order-top { display: flex; align-items: center; gap: 8px; margin-bottom: 9px; }
  .order-label { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 4px; color: #fff; letter-spacing: 0.5px; }
  .order-ref { font-size: 13px; font-weight: 600; flex: 1; }
  .order-time { font-size: 12px; color: var(--text-dim); white-space: nowrap; }
  .order-meta { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; margin-bottom: 8px; }
  .pkg-count { font-size: 11px; color: var(--text-dim); background: var(--surface2); padding: 2px 7px; border-radius: 4px; }
  .order-status { font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 600; }
  .status-delivered { background: #dcfce7; color: #166534; }
  .status-out       { background: #fff7ed; color: #9a3412; }
  .status-way       { background: #eff6ff; color: #1e40af; }
  .status-pending   { background: #f3f4f6; color: #374151; }
  .order-note { font-size: 11px; color: var(--text-dim); }
  .tracking-list { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 7px; }
  .tracking-num { font-size: 10px; font-family: 'Courier New', monospace; color: #4b5563; background: #f0f2f5; border: 1px solid #e0e4ea; padding: 2px 6px; border-radius: 3px; transition: color 0.15s; }
  .tracking-num:hover { color: #111827; }
  a.tracking-link { text-decoration: none; }

  .no-results { text-align: center; color: var(--text-dim); padding: 24px; font-size: 13px; }
  .updated-at { font-size: 11px; color: var(--text-dim); text-align: right; padding: 8px 0 24px; }
</style>
</head>
<body style="background:#f4f6f9;color:#111827">

<header>
  <h1>📦 Tomorrow Telecom — Delivery Calendar</h1>
  <span id="headerDate"></span>
  <div id="headerUser" style="margin-left:12px;display:flex;align-items:center"></div>
</header>

<!-- Filter bar -->
<div class="filter-bar" id="filterBarWrap">
  <span class="filter-label">Filter by name</span>

  <div class="dropdown-wrap" id="nameDropWrap">
    <div class="dropdown-btn" id="nameDropBtn" onclick="toggleDropdown()">
      <span id="nameDropLabel">All names</span>
      <span class="arrow">▼</span>
    </div>
    <div class="dropdown-menu" id="nameDropMenu">
      <div class="dropdown-item" onclick="selectAllNames()">
        <input type="checkbox" id="chk-all" checked> <span style="font-weight:600;color:var(--text)">All names</span>
      </div>
      <div class="dropdown-item" onclick="deselectAllNames()">
        <input type="checkbox" id="chk-none"> <span style="font-weight:600;color:var(--text)">Deselect all</span>
      </div>
      <hr class="dropdown-divider">
      <!-- name items injected by JS -->
      <div id="nameCheckboxes"></div>
    </div>
  </div>

  <span class="filter-label" style="margin-left:8px">Status</span>
  <div class="status-pills">
    <span class="pill pill-all active"  data-status="all"              onclick="setStatusFilter('all')">All</span>
    <span class="pill pill-out"         data-status="out_for_delivery" onclick="setStatusFilter('out_for_delivery')">🚚 Out for Delivery</span>
    <span class="pill pill-way"         data-status="on_the_way"       onclick="setStatusFilter('on_the_way')">📦 On the Way</span>
    <span class="pill pill-done"        data-status="delivered"        onclick="setStatusFilter('delivered')">✓ Delivered</span>
    <span class="pill pill-pend"        data-status="pending"          onclick="setStatusFilter('pending')">⏳ Pending</span>
  </div>
</div>

<!-- Login overlay -->
<div id="loginOverlay" style="
  position:fixed;inset:0;background:rgba(0,0,0,0.45);
  display:flex;align-items:center;justify-content:center;z-index:1000;">
  <div style="background:#fff;border-radius:16px;padding:36px 40px;width:360px;box-shadow:0 20px 60px rgba(0,0,0,0.2);">
    <div style="text-align:center;margin-bottom:28px">
      <div style="font-size:28px;margin-bottom:8px">📦</div>
      <h2 style="font-size:20px;font-weight:700;color:#111827">Tomorrow Telecom</h2>
      <p style="font-size:13px;color:#6b7280;margin-top:4px">Delivery Calendar</p>
    </div>
    <div id="loginError" style="display:none;background:#fee2e2;color:#991b1b;border:1px solid #fca5a5;border-radius:8px;padding:8px 12px;font-size:13px;margin-bottom:16px;text-align:center"></div>
    <div style="margin-bottom:14px">
      <label style="font-size:12px;font-weight:600;color:#374151;display:block;margin-bottom:5px">Username</label>
      <input id="loginUser" type="text" placeholder="Enter username"
        style="width:100%;padding:10px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:14px;outline:none;color:#111827"
        onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div style="margin-bottom:22px">
      <label style="font-size:12px;font-weight:600;color:#374151;display:block;margin-bottom:5px">Password</label>
      <input id="loginPass" type="password" placeholder="Enter password"
        style="width:100%;padding:10px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:14px;outline:none;color:#111827"
        onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button onclick="doLogin()" style="
      width:100%;padding:11px;background:#111827;color:#fff;border:none;
      border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:background 0.15s"
      onmouseover="this.style.background='#374151'" onmouseout="this.style.background='#111827'">
      Sign In
    </button>
  </div>
</div>

<div class="container" style="display:none" id="mainContent">
  <div class="stats-row" id="statsRow"></div>
  <div id="calendar"></div>
  <div class="updated-at" id="updatedAt"></div>

    const err = document.getElementById('loginError');

     <button onclick="doLogout()" style="margin-left:8px;padding:4px 10px;background:#f3f4f6;border:1px solid #d1d5db;border-radius:6px;font-size:12px;cursor:pointer;color:#374151">Sign out</button>`;

}
